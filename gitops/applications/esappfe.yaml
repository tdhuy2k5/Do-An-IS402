apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: esappfe
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ZeusOfDev/Do-An-IS402.git
    targetRevision: main
    path: gitops/esappfe/

  destination:
    server: https://kubernetes.default.svc
    namespace: frontend-ns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true