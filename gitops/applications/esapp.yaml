apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: esapp
  namespace: argocd
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  project: default

  source:
    repoURL: https://github.com/ZeusOfDev/Do-An-IS402.git
    targetRevision: main
    path: gitops/esapp/

  destination:
    server: https://kubernetes.default.svc
    namespace: backend-ns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true