apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-apps-manager
  namespace: argocd
spec:
  project: default


  source:
    repoURL: 'https://github.com/ZeusOfDev/Do-An-IS402.git'
    targetRevision: main
    path: gitops/applications


  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd


  syncPolicy:
    automated:
      prune: true
      selfHeal: true