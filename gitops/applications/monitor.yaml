apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitor
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 86.2.2
    chart: kube-prometheus-stack

  destination:
    server: https://kubernetes.default.svc
    namespace: monitor

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
