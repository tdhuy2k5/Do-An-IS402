{{- if .Values.metrics.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "esapp.fullname" . }}-monitor
  labels:
    release: monitoring   # MUST match kube-prometheus-stack release name
spec:
  selector:
    matchLabels:
      {{- include "esapp.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: 8080
      path: /metrics
      interval: 15s
{{- end }}