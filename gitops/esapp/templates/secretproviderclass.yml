apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "esapp.fullname" . }}-kv-provider

spec:
  provider: azure

  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: {{ .Values.keyvault.identityClientId | quote }}
    keyvaultName: {{ .Values.keyvault.name | quote }}
    tenantId: {{ .Values.keyvault.tenantId | quote }}

    objects: |
      array:
        {{- range .Values.secretsMapping }}
        - |
          objectName: {{ .azureName | quote }}
          objectType: secret
        {{- end }}

  secretObjects:
    - secretName: {{ include "esapp.fullname" . }}-secret
      type: Opaque
      data:
        {{- range .Values.secretsMapping }}
        - objectName: {{ .azureName | quote }}
          key: {{ .envKey | default .azureName | quote }}
        {{- end }}