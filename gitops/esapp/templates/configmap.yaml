apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "esapp.fullname" . }}-config
data:
  APP_NAME: "esapp"
  APP_ENV: "local"
  APP_DEBUG: "true"
  APP_URL: "http://localhost:8080"

  APP_LOCALE: "en"
  APP_FALLBACK_LOCALE: "en"
  APP_FAKER_LOCALE: "en_US"

  APP_MAINTENANCE_DRIVER: "file"

  PHP_CLI_SERVER_WORKERS: "4"

  BCRYPT_ROUNDS: "12"

  LOG_CHANNEL: "stdout"
  LOG_STACK: "single"
  LOG_DEPRECATIONS_CHANNEL: "null"
  LOG_LEVEL: "debug"

  SESSION_DRIVER: "array"

  BROADCAST_CONNECTION: "log"
  FILESYSTEM_DISK: "local"
  QUEUE_CONNECTION: "sync"

  CACHE_STORE: "array"

  MEMCACHED_HOST: "127.0.0.1"

  REDIS_CLIENT: "phpredis"
  REDIS_HOST: "esapp-redis-metrics-staging.redis.cache.windows.net"
  REDIS_PASSWORD: "null"
  REDIS_PORT: "6380"

  MAIL_MAILER: "smtp"
  MAIL_SCHEME: "smtp"
  MAIL_HOST: "smtp.sendgrid.net"
  MAIL_PORT: "587"
  MAIL_USERNAME: "apikey"
  MAIL_FROM_ADDRESS: "duchuy28042005@gmail.com"
  MAIL_ENCRYPTION: "tls"
  MAIL_FROM_NAME: "${APP_NAME}"

  REAL_CHECK_TOKEN_TIME: "60"

  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_DEFAULT_REGION: "us-east-1"
  AWS_BUCKET: ""
  AWS_USE_PATH_STYLE_ENDPOINT: "false"

  VITE_APP_NAME: "${APP_NAME}"

  JWT_ALGO: "HS256"
  AUTH_GUARD: "api"

  GOOGLE_CLIENT_ID: "518525301067-6vci81s4s8eo4klif1rmj18rl8o216po.apps.googleusercontent.com"
  GOOGLE_REDIRECT_URI: "http://fe.135.171.243.189.nip.io/auth/callback"

  DB_CONNECTION: "mysql"
  DB_HOST: "esapp-mysql-staging.mysql.database.azure.com"
  DB_PORT: "3306"
  DB_DATABASE: "esapp"