apiVersion: v1
kind: Service

metadata:
  name: {{ include "esapp.fullname" . }}
  labels:
    {{- include "esapp.labels" . | nindent 4 }}

spec:
  type: {{ .Values.service.type }}

  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP

  selector:
    {{- include "esapp.selectorLabels" . | nindent 4 }}