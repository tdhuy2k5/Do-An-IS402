apiVersion: v1
kind: Service
metadata:
  name: { { include "esapp.fullname" . } }
  labels: { { - include "esapp.labels" . | nindent 4 } }

spec:
  type: { { .Values.service.type } }

  ports:
    - port: { { .Values.service.port } }
      targetPort: http
      protocol: TCP
      name: http

    - name: metrics
      port: { { .Values.metricsService.port } }
      targetPort: http

  selector: { { - include "esapp.selectorLabels" . | nindent 4 } }
