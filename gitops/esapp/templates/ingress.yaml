apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: esapp-ingress
  namespace: backend-ns
  annotations:
    kubernetes.io/ingress.class: haproxy
spec:
  ingressClassName: haproxy
  rules:
    - host: fe.135.171.243.189.nip.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: esapp
                port:
                  number: 8080
