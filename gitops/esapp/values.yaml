# ==============================================================================
# 1. GLOBAL & APPLICATION IMAGE CONFIGURATION
# ==============================================================================
# Tổng số lượng bản sao (Pods) chạy đồng thời cho ứng dụng của bạn
replicaCount: 6
image:
  repository: esappsacr.azurecr.io/esapp-frontend
  tag: latest
  pullPolicy: IfNotPresent
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
# ==============================================================================
# 2. DEPLOYMENT CONFIGURATION (Pods, Probes, Resources)
# ==============================================================================
podAnnotations: {}
podLabels: {app: esapp}
podSecurityContext: {}
securityContext: {}
# Cấu hình lượng tài nguyên CPU/RAM cấp phát cho mỗi Pod
resources: {}
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi

# Bộ kiểm tra trạng thái hoạt động của ứng dụng (đang trỏ vào cổng HTTP chính)
livenessProbe:
  httpGet:
    path: /
    port: http # Sẽ map với tên cổng định nghĩa trong deployment.yaml
readinessProbe:
  httpGet:
    path: /
    port: http
# Tự động tăng giảm số lượng Pods dựa theo tải hệ thống
autoscaling:
  enabled: true
  minReplicas: 6
  maxReplicas: 31
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
# Hạ tầng điều phối Pod chạy trên Node nào
nodeSelector: {}
tolerations: []
affinity: {}
# ==============================================================================
# 3. NETWORKING CONFIGURATION (Service, Ingress, Gateway API)
# ==============================================================================

# --- KUBERNETES SERVICES ---
# Tách bạch rõ ràng giữa cổng chạy App và cổng xuất số liệu Metrics
service:
  type: ClusterIP
  port: 8080 # Cổng mà Service nội bộ lắng nghe cho App chính
metricsService:
  type: ClusterIP
  port: 9090 # Cổng Service nội bộ chuyên phục vụ việc cào dữ liệu Prometheus
# --- INGRESS (Lộ tuyến bên ngoài đi vào App chính) ---
ingress:
  enabled: true
  className: haproxy
  hosts:
    - host: esapp.company.com
      paths:
        - path: /
          pathType: Prefix
# --- KUBERNETES GATEWAY API (Tùy chọn nâng cao thế hệ mới) ---
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - chart-example.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /headers
# ==============================================================================
# 4. MONITORING & METRICS CONFIGURATION
# ==============================================================================
# Cấu hình cụ thể nơi ứng dụng xuất metrics nội bộ bên trong Container
metrics:
  enabled: true
  port: 8080 # Trả về đúng bản chất: app chạy metrics ở cổng 9090 độc lập
  path: /metrics # Đường dẫn tiêu chuẩn để Prometheus hoặc hệ thống giám sát vào đọc dữ liệu
# ==============================================================================
# 5. STORAGE & AZURE INTEGRATION (Key Vault, Secrets, Volumes)
# ==============================================================================

# Cấu hình kết nối tới Azure Key Vault thông qua Secret Provider Class (CSI)
keyvault:
  name: "esapp-kv-staging"
  tenantId: "2dff09ac-2b3b-4182-9953-2b548e0d0b39"
  identityClientId: "f6774f8e-acb6-4cf7-a915-8dc0e9b8a892"
# Bản đồ ánh xạ: Tên Secret trên Azure KV --> Tên biến môi trường lưu vào file .env
secretsMapping:
  - azureName: "APP-KEY"
    envKey: "APP_KEY"
  - azureName: "MYSQL-ROOT-PASSWORD"
    envKey: "DB_PASSWORD"
  - azureName: "JWT-SECRET"
    envKey: "JWT_SECRET"
  - azureName: "GOOGLE-CLIENT-SECRET"
    envKey: "GOOGLE_CLIENT_SECRET"
  - azureName: "MYSQL-ADMIN-USERNAME"
    envKey: "DB_USERNAME"
  - azureName: "REDIS-PASSWORD"
    envKey: "REDIS_PASSWORD"
# Khai báo các Volume bổ sung nếu có ngoài luồng CSI mặc định
volumes: []
volumeMounts: []
# ==============================================================================
# 6. SECURITY ACCOUNTS
# ==============================================================================
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""
backend:
  image:
    repository: esappsacr.azurecr.io/esapp-backend
    tag: 2142cd87c6422e0455fe978ec1e760c75298eb62
