apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "esappfe.fullname" . }}-ingress

spec:
  ingressClassName: haproxy

  rules:
    - host: fe.135.171.243.189.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "esappfe.fullname" . }}
                port:
                  number: 80