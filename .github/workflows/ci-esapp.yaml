name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - 'is-web-project/**' # Triggers only when changes are made inside this folder

permissions:
  contents: write
  id-token: write

env:
  ACR_NAME: esappsacr
  IMAGE_NAME: esapp-backend

jobs:
  test-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Azure OIDC Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      # Run tests (quality gate using your multi-stage tester target)
      - name: Run Quality Gate
        uses: docker/build-push-action@v6
        with:
          context: ./is-web-project
          file: ./is-web-project/Dockerfile
          target: tester
          cache-from: |
            type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache
          cache-to: |
            type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache,mode=max

      # Build + Push optimized production image
      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: ./is-web-project
          file: ./is-web-project/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache
          cache-to: |
            type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache,mode=max

      # -----------------------------
      # UPDATE HELM VALUES (GITOPS)
      # -----------------------------

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Update Helm values.yaml
        run: |
          IMAGE_TAG=${{ github.sha }}
          ACR_NAME=${{ env.ACR_NAME }}
          IMAGE_NAME=${{ env.IMAGE_NAME }}
          
          # Updates the backend image blocks inside your GitOps configuration folder
          yq -i '.backend.image.repository = env(ACR_NAME) + ".azurecr.io/" + env(IMAGE_NAME)' \
            gitops/esapp/values.yaml

          yq -i '.backend.image.tag = env(IMAGE_TAG)' \
            gitops/esapp/values.yaml

      - name: Commit and push Helm update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add gitops/esapp/values.yaml

          git commit -m "chore(backend): update image ${{ github.sha }} [skip ci]" || echo "No changes to commit"

          git push