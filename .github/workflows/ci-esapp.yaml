name: BE CI

on:
  push:
    branches:
      - main
    paths:
      - "is-web-project/**"

permissions:
  contents: write
  id-token: write

env:
  ACR_NAME: esappsacr
  IMAGE_NAME: esapp-backend

jobs:
  test-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Run Quality Gate
        uses: docker/build-push-action@v6
        with:
          context: ./is-web-project
          file: ./is-web-project/Dockerfile
          target: tester

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: ./is-web-project
          file: ./is-web-project/Dockerfile
          target: production
          push: true
          tags: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Update GitOps values
        run: |
          sed -i "s/^  tag:.*/  tag: ${{ github.sha }}/" gitops/esapp/values.yaml

          echo "Updated values.yaml:"
          cat gitops/esapp/values.yaml

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Debug Git Remote
        run: |
          echo "==== REMOTES ===="
          git remote -v

      - name: Commit and Push
        run: |
          git add gitops/esapp/values.yaml

          if ! git diff --cached --quiet; then
            git commit -m "chore: update backend image ${{ github.sha }} [skip ci]"
            git push origin HEAD:main
          else
            echo "No changes detected"
          fi