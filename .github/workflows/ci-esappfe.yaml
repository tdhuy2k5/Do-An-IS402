name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - "electronic-e-commerce/**"

permissions:
  contents: write
  id-token: write

env:
  ACR_NAME: esappsacr
  IMAGE_NAME: esapp-frontend

jobs:
  test-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install yq (IMPORTANT FIX)
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq
          yq --version

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Run Quality Gate (Build only tester stage)
        uses: docker/build-push-action@v6
        with:
          context: ./electronic-e-commerce
          file: ./electronic-e-commerce/Dockerfile
          target: tester
          push: false

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: ./electronic-e-commerce
          file: ./electronic-e-commerce/Dockerfile
          target: production
          push: true
          tags: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ✅ FIXED: update GitOps using yq (NO sed issues)
      - name: Update GitOps values.yaml
        run: |
          echo "Before update:"
          cat gitops/esappfe/values.yaml

          yq -i '.image.tag = "${{ github.sha }}"' gitops/esappfe/values.yaml

          echo "After update:"
          cat gitops/esappfe/values.yaml

      - name: Commit and Push GitOps change
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add gitops/esappfe/values.yaml

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update frontend image ${{ github.sha }}"
            git push
          fi