apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-green
  namespace: dev
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
      color: green           # ← Important for Blue-Green
  template:
    metadata:
      labels:
        app: frontend
        color: green         # ← Important for Blue-Green
    spec:
      containers:
        - name: frontend
          image: esappdacr.azurecr.io/esapp-frontend:IMAGE_TAG
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6