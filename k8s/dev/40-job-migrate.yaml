apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migrate
  namespace: dev
spec:
  suspend: true
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: esappdacr.azurecr.io/esapp-backend:IMAGE_TAG
          imagePullPolicy: IfNotPresent
          command: ["php", "artisan", "migrate", "--force"]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
