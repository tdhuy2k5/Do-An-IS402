apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: esapp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/Do-An-IS402.git
    targetRevision: main
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: esapp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
