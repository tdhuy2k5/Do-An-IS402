apiVersion: v1
kind: ServiceAccount
metadata:
  name: workload-sa
  namespace: esapp
  annotations:
    azure.workload.identity/client-id: "${WORKLOAD_IDENTITY_CLIENT_ID}"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-reader
  namespace: esapp
rules:
  - apiGroups: [""]
    resources: ["configmaps", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-reader-binding
  namespace: esapp
subjects:
  - kind: ServiceAccount
    name: workload-sa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: app-reader
