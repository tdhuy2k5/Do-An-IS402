apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: esapp
  labels:
    app: frontend
    app.kubernetes.io/part-of: esapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/part-of: esapp
    spec:
      serviceAccountName: workload-sa
      containers:
        - name: frontend
          image: ${ACR_LOGIN_SERVER}/electronic-e-commerce:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: esapp
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 8080
